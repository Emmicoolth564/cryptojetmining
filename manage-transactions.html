<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Approval • CryptoJet Admin</title>
<style>
:root {
  --bg:#020617; --s1:#0c1628; --s2:#111f35;
  --neon:#00f0ff; --green:#22c55e; --gold:#f59e0b;
  --red:#ef4444; --border:rgba(0,240,255,0.12);
  --text:#e2e8f0; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{padding:16px 18px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back{font-size:24px;color:var(--neon);cursor:pointer;text-decoration:none;}
.header-title{font-size:18px;font-weight:800;color:var(--neon);flex:1;text-align:center;letter-spacing:0.5px;}
.badge-count{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;color:var(--muted);background:var(--s1);transition:all 0.2s;}
.ftab.active{background:rgba(0,240,255,0.1);border-color:var(--neon);color:var(--neon);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px;}
.stat-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:800;color:var(--neon);}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px;}

.list{padding:0 16px 80px;}

/* TX CARD */
.tx-card{background:var(--s1);border-radius:18px;padding:18px;margin-bottom:12px;border:1px solid var(--border);}
.tx-card.recharge{border-left:3px solid var(--green);}
.tx-card.withdrawal{border-left:3px solid var(--red);}
.tx-card.approved{opacity:0.5;}

.tx-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.tx-type-badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;}
.type-recharge{background:rgba(34,197,94,0.15);color:var(--green);}
.type-withdrawal{background:rgba(239,68,68,0.15);color:var(--red);}
.tx-status-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;}
.status-pending{background:rgba(245,158,11,0.15);color:var(--gold);}
.status-approved{background:rgba(34,197,94,0.15);color:var(--green);}
.status-rejected{background:rgba(239,68,68,0.15);color:var(--red);}

.tx-amount{font-size:28px;font-weight:800;margin-bottom:4px;}
.amt-recharge{color:var(--green);}
.amt-withdrawal{color:var(--red);}

.tx-details{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;padding:12px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);}
.tx-row{display:flex;justify-content:space-between;font-size:13px;}
.tx-lbl{color:var(--muted);}
.tx-val{font-weight:600;color:var(--text);word-break:break-all;text-align:right;max-width:60%;}
.tx-val.highlight{color:var(--neon);}

/* PROOF IMAGE */
.proof-img{width:100%;border-radius:12px;margin-bottom:12px;border:1px solid var(--border);max-height:200px;object-fit:cover;cursor:pointer;}
.proof-link{display:block;padding:10px 14px;background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.2);border-radius:10px;color:var(--neon);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:12px;word-break:break-all;}

/* ACTION BUTTONS */
.action-row{display:flex;gap:8px;}
.action-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.action-btn:active{transform:scale(0.97);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-approve{background:rgba(34,197,94,0.15);color:var(--green);border:1.5px solid rgba(34,197,94,0.3);}
.btn-approve:hover:not(:disabled){background:var(--green);color:#000;}
.btn-reject{background:rgba(239,68,68,0.15);color:var(--red);border:1.5px solid rgba(239,68,68,0.3);}
.btn-reject:hover:not(:disabled){background:var(--red);color:#fff;}
.btn-manual{background:rgba(245,158,11,0.12);color:var(--gold);border:1.5px solid rgba(245,158,11,0.25);font-size:12px;}
.btn-manual:hover:not(:disabled){background:var(--gold);color:#000;}

.manual-row{display:flex;gap:6px;margin-top:8px;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:40px;height:40px;border:3px solid rgba(0,240,255,0.1);border-top:3px solid var(--neon);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--green);color:#022c22;padding:11px 22px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99999;display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:12px;}
.lightbox-close{position:absolute;top:20px;right:20px;font-size:32px;color:#fff;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="admin.html">←</a>
  <div class="header-title">⚡ Transaction Approval</div>
  <div class="badge-count" id="pendingCount">0</div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val" id="statPending">0</div><div class="stat-lbl">Pending</div></div>
  <div class="stat-box"><div class="stat-val" id="statRecharge">0</div><div class="stat-lbl">Recharges</div></div>
  <div class="stat-box"><div class="stat-val" id="statWithdraw">0</div><div class="stat-lbl">Withdrawals</div></div>
</div>

<div class="filter-tabs">
  <div class="ftab active" onclick="setFilter('all',this)">All Pending</div>
  <div class="ftab" onclick="setFilter('recharge',this)">💰 Recharges</div>
  <div class="ftab" onclick="setFilter('withdrawal',this)">💸 Withdrawals</div>
  <div class="ftab" onclick="setFilter('history',this)">📋 Recent History</div>
</div>

<div class="list" id="txList">
  <div class="empty"><div class="spinner"></div><div>Loading transactions…</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">✕</div>
  <img id="lightboxImg" src="" alt="Proof">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey:      "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:  "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:   "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

const ADMIN_UID  = "1G40GHwudBcea5GGdEeIIKFT5rL2";
const SECRET     = "cryptojet_secret_2024";

const CF = {
  approveRecharge: "https://approverecharge-t34xxkwqvq-ew.a.run.app",
  rejectRecharge:  "https://rejectrecharge-t34xxkwqvq-ew.a.run.app",
  approveWithdraw: "https://approvewithdraw-t34xxkwqvq-ew.a.run.app",
  rejectWithdraw:  "https://rejectwithdraw-t34xxkwqvq-ew.a.run.app",
  approveUSDT:     "https://approveusdtwithdraw-t34xxkwqvq-ew.a.run.app",
};

let allTx        = {};   // txId → tx object
let allUsers     = {};   // uid → user
let currentFilter = "all";

// ── BOOT ──────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user || user.uid !== ADMIN_UID) {
    alert("Access denied");
    window.location.href = "signin.html";
    return;
  }
  // Load users first (for minerId display)
  const uSnap = await db.ref("users").once("value");
  allUsers = uSnap.val() || {};
  // Real-time listener on transactions
  db.ref("transactions").on("value", snap => {
    allTx = snap.val() || {};
    updateStats();
    render();
  });
});

// ── FILTER ────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll(".ftab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  const txList    = Object.values(allTx);
  const pending   = txList.filter(t => t.status === "pending");
  const recharges = pending.filter(t => t.type === "recharge");
  const withdraws = pending.filter(t => t.type === "withdrawal");
  document.getElementById("statPending").textContent  = pending.length;
  document.getElementById("statRecharge").textContent = recharges.length;
  document.getElementById("statWithdraw").textContent = withdraws.length;
  document.getElementById("pendingCount").textContent = pending.length + " pending";
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const list = document.getElementById("txList");
  let entries = Object.entries(allTx).sort((a,b) => (b[1].date||0) - (a[1].date||0));

  if (currentFilter === "all") {
    entries = entries.filter(([,t]) => t.status === "pending");
  } else if (currentFilter === "recharge") {
    entries = entries.filter(([,t]) => t.status === "pending" && t.type === "recharge");
  } else if (currentFilter === "withdrawal") {
    entries = entries.filter(([,t]) => t.status === "pending" && t.type === "withdrawal");
  } else if (currentFilter === "history") {
    entries = entries.filter(([,t]) => t.status !== "pending").slice(0, 40);
  }

  if (!entries.length) {
    list.innerHTML = `<div class="empty">✅ No transactions here</div>`;
    return;
  }

  list.innerHTML = "";
  entries.forEach(([txId, tx]) => list.appendChild(buildCard(txId, tx)));
}

// ── BUILD CARD ────────────────────────────────────────────────
function buildCard(txId, tx) {
  const card       = document.createElement("div");
  const isRecharge = tx.type === "recharge";
  const isPending  = tx.status === "pending";
  const user       = allUsers[tx.uid] || {};
  const minerId    = user.minerId || tx.uid?.slice(0,8) || "Unknown";
  const dateStr    = tx.date ? new Date(tx.date).toLocaleString("en-NG") : "—";
  card.className   = `tx-card ${isRecharge ? "recharge" : "withdrawal"} ${!isPending ? "approved" : ""}`;
  card.id          = "card-" + txId;

  // Proof section
  let proofHTML = "";
  if (tx.proof && tx.proof.startsWith("http")) {
    proofHTML = `<img src="${tx.proof}" class="proof-img" onclick="openLightbox('${tx.proof}')" title="Tap to enlarge">`;
  } else if (tx.txHash) {
    proofHTML = `<a href="https://bscscan.com/tx/${tx.txHash}" target="_blank" class="proof-link">🔗 View on BSCScan: ${tx.txHash.slice(0,20)}...</a>`;
  }

  // Details rows
  let detailRows = `
    <div class="tx-row"><span class="tx-lbl">User</span><span class="tx-val highlight">${minerId}</span></div>
    <div class="tx-row"><span class="tx-lbl">Date</span><span class="tx-val">${dateStr}</span></div>
    <div class="tx-row"><span class="tx-lbl">Method</span><span class="tx-val">${tx.method || "—"}</span></div>`;

  if (tx.bank)          detailRows += `<div class="tx-row"><span class="tx-lbl">Bank</span><span class="tx-val">${tx.bank}</span></div>`;
  if (tx.number)        detailRows += `<div class="tx-row"><span class="tx-lbl">Account</span><span class="tx-val">${tx.number}</span></div>`;
  if (tx.walletAddress) detailRows += `<div class="tx-row"><span class="tx-lbl">Wallet</span><span class="tx-val">${tx.walletAddress}</span></div>`;
  if (tx.finalAmount)   detailRows += `<div class="tx-row"><span class="tx-lbl">Send Amount</span><span class="tx-val" style="color:var(--gold)">$${tx.finalAmount}</span></div>`;

  // Action buttons — only for pending
  let actionsHTML = "";
  if (isPending) {
    if (isRecharge) {
      actionsHTML = `
        <div class="action-row">
          <button class="action-btn btn-approve" id="approve-${txId}" onclick="approveRecharge('${txId}')">✅ Approve</button>
          <button class="action-btn btn-reject"  id="reject-${txId}"  onclick="rejectTx('${txId}','recharge')">❌ Reject</button>
        </div>
        <div class="manual-row">
          <button class="action-btn btn-manual" onclick="manualApproveRecharge('${txId}')">⚡ Manual Approve (direct)</button>
        </div>`;
    } else {
      // Withdrawal
      const isUSDT = tx.method === "usdt" || tx.method === "bep20" || tx.method === "trc20";
      actionsHTML = `
        <div class="action-row">
          <button class="action-btn btn-approve" id="approve-${txId}" onclick="${isUSDT ? `approveUSDTWithdraw('${txId}')` : `approveWithdraw('${txId}')`}">✅ Approve</button>
          <button class="action-btn btn-reject"  id="reject-${txId}"  onclick="rejectTx('${txId}','withdrawal')">❌ Reject</button>
        </div>
        <div class="manual-row">
          <button class="action-btn btn-manual" onclick="manualApproveWithdraw('${txId}')">⚡ Manual Approve (direct)</button>
        </div>`;
    }
  }

  card.innerHTML = `
    <div class="tx-header">
      <div>
        <span class="tx-type-badge ${isRecharge ? "type-recharge" : "type-withdrawal"}">${isRecharge ? "💰 Recharge" : "💸 Withdrawal"}</span>
      </div>
      <span class="tx-status-badge status-${tx.status||"pending"}">${(tx.status||"pending").toUpperCase()}</span>
    </div>
    <div class="tx-amount ${isRecharge ? "amt-recharge" : "amt-withdrawal"}">${isRecharge ? "+" : "−"}$${tx.amount}</div>
    <div class="tx-details">${detailRows}</div>
    ${proofHTML}
    ${actionsHTML}`;

  return card;
}

// ── APPROVE RECHARGE (via Cloud Function) ────────────────────
async function approveRecharge(txId) {
  if (!confirm("Approve this recharge?")) return;
  setButtons(txId, true);
  try {
    const resp = await fetch(`${CF.approveRecharge}?txId=${txId}&secret=${SECRET}`);
    if (!resp.ok) throw new Error(await resp.text());
    markDone(txId, "approved");
    toast("✅ Recharge approved!");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Failed: " + e.message);
  }
}

// ── APPROVE WITHDRAWAL (via Cloud Function) ──────────────────
async function approveWithdraw(txId) {
  if (!confirm("Approve this bank withdrawal?")) return;
  setButtons(txId, true);
  try {
    const resp = await fetch(`${CF.approveWithdraw}?txId=${txId}&secret=${SECRET}`);
    if (!resp.ok) throw new Error(await resp.text());
    markDone(txId, "approved");
    toast("✅ Withdrawal approved!");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Failed: " + e.message);
  }
}

// ── APPROVE USDT WITHDRAWAL (via Cloud Function) ─────────────
async function approveUSDTWithdraw(txId) {
  if (!confirm("Approve and auto-send USDT?")) return;
  setButtons(txId, true);
  try {
    const resp = await fetch(`${CF.approveUSDT}?txId=${txId}&secret=${SECRET}`);
    if (!resp.ok) throw new Error(await resp.text());
    markDone(txId, "approved");
    toast("✅ USDT sent!");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Failed: " + e.message);
  }
}

// ── REJECT (via Cloud Function) ───────────────────────────────
async function rejectTx(txId, type) {
  if (!confirm("Reject this transaction?")) return;
  setButtons(txId, true);
  const url = type === "recharge" ? CF.rejectRecharge : CF.rejectWithdraw;
  try {
    const resp = await fetch(`${url}?txId=${txId}&secret=${SECRET}`);
    if (!resp.ok) throw new Error(await resp.text());
    markDone(txId, "rejected");
    toast("🗑 Transaction rejected");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Failed: " + e.message);
  }
}

// ── MANUAL APPROVE RECHARGE (direct Firebase — fallback) ──────
async function manualApproveRecharge(txId) {
  if (!confirm("Manually approve? This directly adds balance without Cloud Function.")) return;
  setButtons(txId, true);
  try {
    const snap = await db.ref("transactions/" + txId).once("value");
    const tx   = snap.val();
    if (!tx || tx.status !== "pending") throw new Error("Transaction not pending");

    await db.ref("users/" + tx.uid + "/balance").transaction(b => (b || 0) + tx.amount);
    await db.ref("transactions/" + txId).update({ status: "approved", approvedAt: Date.now() });
    await db.ref("userTransactions/" + tx.uid + "/" + txId).update({ status: "approved" });

    markDone(txId, "approved");
    toast("✅ Manually approved!");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Error: " + e.message);
  }
}

// ── MANUAL APPROVE WITHDRAWAL (direct Firebase — fallback) ────
async function manualApproveWithdraw(txId) {
  if (!confirm("Manually approve withdrawal? This directly deducts balance.")) return;
  setButtons(txId, true);
  try {
    const snap = await db.ref("transactions/" + txId).once("value");
    const tx   = snap.val();
    if (!tx || tx.status !== "pending") throw new Error("Transaction not pending");

    const balSnap = await db.ref("users/" + tx.uid + "/balance").once("value");
    const balance = balSnap.val() || 0;
    if (balance < tx.amount) throw new Error("User balance too low ($" + balance + ")");

    await db.ref("users/" + tx.uid + "/balance").set(Math.max(0, balance - tx.amount));
    await db.ref("transactions/" + txId).update({ status: "approved", approvedAt: Date.now() });
    await db.ref("userTransactions/" + tx.uid + "/" + txId).update({ status: "approved" });

    markDone(txId, "approved");
    toast("✅ Withdrawal manually approved!");
  } catch(e) {
    setButtons(txId, false);
    toast("❌ Error: " + e.message);
  }
}

// ── UI HELPERS ────────────────────────────────────────────────
function setButtons(txId, disabled) {
  ["approve-" + txId, "reject-" + txId].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
}

function markDone(txId, status) {
  const card = document.getElementById("card-" + txId);
  if (!card) return;
  // Update badge
  const badge = card.querySelector(".tx-status-badge");
  if (badge) { badge.textContent = status.toUpperCase(); badge.className = "tx-status-badge status-" + status; }
  // Remove action buttons
  card.querySelectorAll(".action-row,.manual-row").forEach(el => el.remove());
  card.classList.add("approved");
  // Update stats
  if (allTx[txId]) allTx[txId].status = status;
  updateStats();
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = 0, 3000);
}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}
</script>
</body>
</html>
