<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions • CryptoJet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: #020617;
    color: #e2e8f0;
    min-height: 100vh;
}

.header {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    background: rgba(2,6,23,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(34,197,94,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
}
.back { font-size:28px; color:#22c55e; cursor:pointer; margin-right:8px; }
.header h3 { flex:1; text-align:center; font-size:18px; font-weight:700; }

/* SKELETON LOADER */
.skeleton-wrap { padding: 16px; }
.skeleton-card {
    background: #0f172a;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.skeleton-line {
    background: linear-gradient(90deg, #1e2937 25%, #2d3f55 50%, #1e2937 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
    height: 14px;
    margin-bottom: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* TABS */
.tabs {
    display: flex;
    gap: 6px;
    padding: 14px 16px;
    background: #020617;
    position: sticky;
    top: 65px;
    z-index: 99;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
    flex-shrink: 0;
    padding: 9px 16px;
    background: #0f172a;
    border: 1.5px solid transparent;
    border-radius: 10px;
    color: #64748b;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.tab.active {
    background: rgba(34,197,94,0.12);
    border-color: #22c55e;
    color: #22c55e;
}

/* CONTENT */
.content { padding: 14px 16px 100px; }

/* TX CARD */
.tx-card {
    background: #0f172a;
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.06);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.tx-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-right: 14px;
    flex-shrink: 0;
}
.icon-recharge { background: rgba(34,197,94,0.15); }
.icon-withdraw { background: rgba(239,68,68,0.15); }

.tx-left { display: flex; align-items: center; flex: 1; min-width: 0; }
.tx-info { min-width: 0; }
.tx-type {
    font-size: 15px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 3px;
}
.tx-date {
    font-size: 12px;
    color: #475569;
}
.tx-method {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
    text-transform: capitalize;
}

.tx-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
.tx-amount {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
}
.amount-in { color: #22c55e; }
.amount-out { color: #f87171; }

.tx-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}
.badge-approved { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-rejected { background: rgba(239,68,68,0.15);  color: #f87171; }

.empty {
    text-align: center;
    padding: 80px 20px;
    color: #475569;
}
.empty .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 15px; }

/* Summary bar */
.summary {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
}
.summary-box {
    flex: 1;
    background: #0f172a;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
}
.summary-label { font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
.summary-value { font-size: 16px; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Transactions</h3>
    <div style="width:36px"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('all', this)">All</div>
    <div class="tab" onclick="switchTab('pending', this)">⏳ Pending</div>
    <div class="tab" onclick="switchTab('approved', this)">✅ Approved</div>
    <div class="tab" onclick="switchTab('rejected', this)">❌ Rejected</div>
</div>

<div class="content">
    <!-- Skeleton shown immediately -->
    <div class="skeleton-wrap" id="skeleton">
        ${[1,2,3,4].map(() => `
        <div class="skeleton-card">
            <div style="flex:1">
                <div class="skeleton-line" style="width:40%;"></div>
                <div class="skeleton-line" style="width:60%;"></div>
            </div>
            <div style="text-align:right;width:80px">
                <div class="skeleton-line" style="width:100%;"></div>
                <div class="skeleton-line" style="width:70%;margin-left:auto"></div>
            </div>
        </div>`).join('')}
    </div>

    <div id="summary" style="display:none">
        <div class="summary">
            <div class="summary-box">
                <div class="summary-label">Total In</div>
                <div class="summary-value amount-in" id="totalIn">$0</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">Total Out</div>
                <div class="summary-value amount-out" id="totalOut">$0</div>
            </div>
        </div>
    </div>

    <div id="tx-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
    authDomain: "cj-miner.firebaseapp.com",
    databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) {
    alert("Please sign in first");
    window.location.href = "signin.html";
}

let currentTab = "all";
let allTransactions = [];

function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    renderTransactions();
}

// Real-time listener — updates instantly when admin approves/rejects
db.ref("transactions").orderByChild("uid").equalTo(uid).on("value", snap => {
    const txns = snap.val() || {};

    allTransactions = Object.entries(txns)
        .map(([key, tx]) => ({
            id: key,
            ...tx,
            // Strip out receipt/proof image — never show in history
            proof: null,
            timestamp: tx.date || Date.now()
        }))
        .sort((a, b) => b.timestamp - a.timestamp);

    document.getElementById("skeleton").style.display = "none";
    document.getElementById("summary").style.display = "block";
    renderTransactions();
});

function renderTransactions() {
    const list = document.getElementById("tx-list");

    let filtered = allTransactions;
    if (currentTab !== "all") {
        filtered = allTransactions.filter(tx => tx.status === currentTab);
    }

    // Update summary (always based on ALL transactions)
    const totalIn  = allTransactions.filter(t => t.type === "recharge" && t.status === "approved").reduce((s, t) => s + (t.amount || 0), 0);
    const totalOut = allTransactions.filter(t => t.type === "withdraw" && t.status === "approved").reduce((s, t) => s + (t.amount || 0), 0);
    document.getElementById("totalIn").textContent  = "$" + totalIn.toFixed(2);
    document.getElementById("totalOut").textContent = "$" + totalOut.toFixed(2);

    if (filtered.length === 0) {
        list.innerHTML = `
            <div class="empty">
                <div class="empty-icon">📭</div>
                <p>No ${currentTab === "all" ? "" : currentTab} transactions yet</p>
            </div>`;
        return;
    }

    list.innerHTML = filtered.map(tx => {
        const date = new Date(tx.timestamp);
        const day  = date.toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' });
        const time = date.toLocaleTimeString('en-NG', { hour:'2-digit', minute:'2-digit' });

        const isRecharge = tx.type === "recharge";
        const icon       = isRecharge ? "💳" : "🏦";
        const iconClass  = isRecharge ? "icon-recharge" : "icon-withdraw";
        const amtClass   = isRecharge ? "amount-in" : "amount-out";
        const amtPrefix  = isRecharge ? "+$" : "−$";
        const label      = isRecharge ? "Recharge" : "Withdrawal";
        const badgeClass = `badge-${tx.status || "pending"}`;

        return `
        <div class="tx-card">
            <div class="tx-left">
                <div class="tx-icon ${iconClass}">${icon}</div>
                <div class="tx-info">
                    <div class="tx-type">${label}</div>
                    <div class="tx-date">${day} · ${time}</div>
                    <div class="tx-method">${tx.method || "—"}</div>
                </div>
            </div>
            <div class="tx-right">
                <div class="tx-amount ${amtClass}">${amtPrefix}${Number(tx.amount).toFixed(2)}</div>
                <div class="tx-badge ${badgeClass}">${(tx.status || "pending").toUpperCase()}</div>
            </div>
        </div>`;
    }).join("");
}
</script>
</body>
</html>
