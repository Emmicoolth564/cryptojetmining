<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
        --neon: #00f0ff;
        --accent: #00ffcc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header {
        text-align:center;
        font-size:28px;
        color:#00ffcc;
        margin-top:30px;
        font-weight:900;
        letter-spacing:1px;
        animation:glow 2s infinite alternate;
    }
    @keyframes glow {
        from { text-shadow:0 0 10px #00ffcc; }
        to { text-shadow:0 0 25px #00ffcc; }
    }

    .page-content {
        min-height: calc(100vh - 90px);
        padding-bottom: 90px;
    }

    /* PROFILE */
    .profile {
        margin:15px;
        padding:20px;
        border-radius:20px;
        background:linear-gradient(145deg,#020617,#0f172a);
        display:flex;
        align-items:center;
        gap:15px;
        box-shadow:0 0 20px rgba(0,255,204,0.15);
    }
    .avatar {
        width:65px;
        height:65px;
        border-radius:50%;
        background:#00ffcc22;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:26px;
        font-weight:900;
    }
    .uid { color:#22c55e; font-weight:700; }
    .level { color:#38bdf8; font-size:13px; }

    /* BALANCE CARD */
        .balance-card {
        margin-top:12px; margin-bottom:12px; padding:16px 14px; border-radius:14px;
        background:#0f172a; display:flex; justify-content:space-between;
        box-shadow:0 0 20px rgba(0,255,204,0.05);
        border:1px solid rgba(255,255,255,0.04);
        margin-left:15px; margin-right:15px;
    }
        .balance-item { text-align:center; flex:1; }
        .label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:0.06em; }
        .value { margin-top:4px; font-size:20px; color:#00ffcc; font-weight:700; font-family:'Space Grotesk',sans-serif; }

    /* ACTIONS */
    .actions {
        display:flex;
        gap:10px;
        margin:15px;
    }
    .btn {
        flex:1;
        padding:14px;
        border-radius:14px;
        background:#0f172a;
        text-align:center;
        font-weight:600;
        transition:0.3s;
    }
    .btn:active { transform:scale(0.95); }

        .grid {
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        margin:15px;
    }
    .box {
        padding:18px 16px;
        border-radius:16px;
        background:#0f172a;
        display:flex;
        align-items:center;
        gap:12px;
        font-weight:600;
        transition:0.3s;
    }
    .box:active { background:#1e293b; transform:scale(0.97); }

    /* CLEAN SVG ICONS (no emojis) */
    .icon {
        width:32px;
        height:32px;
        background:rgba(0,255,204,0.1);
        border-radius:10px;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink: 0;
    }

    /* LIST */
    .list {
        margin:15px;
    }
    .list-item {
        padding:16px;
        border-radius:14px;
        margin-bottom:10px;
        background:#0f172a;
        display:flex;
        align-items:center;
        gap:14px;
        transition:0.3s;
    }
    .list-item:active {
        transform:scale(0.97);
        background:#1e293b;
    }

    /* NAV - EXACTLY LIKE YOUR ORIGINAL */
    .nav-glass {
        position:fixed;
        bottom:20px;
        left:50%;
        transform:translateX(-50%);
        width:90%;
        height:70px;
        display:flex;
        justify-content:space-around;
        align-items:center;
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(20px);
        border-radius:25px;
        box-shadow:0 8px 30px rgba(0,0,0,0.4);
        border:1px solid rgba(255,255,255,0.08);
        z-index:999;
    }
    .nav-item {
        text-align:center;
        color:#aaa;
        font-size:11px;
    }
    .nav-item.active { color:#00ffcc; }

    /* ICONS - MATCHING YOUR OLD FILE */
    .icon { width:26px; height:26px; margin-bottom:4px; position:relative; }
    .icon.home::before {
        content:""; position:absolute; width:18px; height:18px;
        background:#aaa; transform:rotate(45deg);
        top:4px; left:4px; border-radius:3px;
    }
    .nav-item.active .home::before { background:#00ffcc; }

    .icon.miner::before {
        content:"⚡"; font-size:20px; position:absolute; left:3px; top:-2px;
    }
    .nav-item.active .miner::before { color:#00ffcc; }

    .icon.me {
        background:#ffffff22;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
    }
    .icon.me::before { content:"👤"; font-size:14px; }
    .nav-item.active .me { background:#00ffcc33; }

   #loader{position:fixed;inset:0;background:#060b14;display:flex;align-items:center;justify-content:center;z-index:9999;}
    .loader-wrap{display:flex;flex-direction:column;align-items:center;}
    .ring-outer{position:relative;width:140px;height:140px;margin-bottom:28px;}
    .loader-ring-svg{position:absolute;top:0;left:0;width:140px;height:140px;}
    .ring-track{fill:none;stroke:rgba(0,240,255,0.06);stroke-width:2;}
    .ring-spin{fill:none;stroke:url(#ringGrad);stroke-width:2;stroke-linecap:round;stroke-dasharray:180 250;animation:spinRing 1.8s linear infinite;transform-origin:70px 70px;}
    .ring-spin-2{fill:none;stroke:rgba(0,255,136,0.25);stroke-width:1.5;stroke-linecap:round;stroke-dasharray:60 370;animation:spinRing 2.4s linear infinite reverse;transform-origin:70px 70px;}
    @keyframes spinRing{to{transform:rotate(360deg);}}
    .dollar-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .dollar-svg{width:36px;height:36px;}
    .dollar-path{fill:none;stroke:#00ffcc;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:120;stroke-dashoffset:120;animation:drawDollar 1.2s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;}
    .dollar-line{stroke:#00ffcc;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:24;stroke-dashoffset:24;animation:drawDollar 0.5s ease 0.8s forwards;}
    @keyframes drawDollar{to{stroke-dashoffset:0;}}
    .pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:88px;height:88px;border-radius:50%;border:1px solid rgba(0,255,204,0.3);animation:pulseRing 2s ease-out infinite;}
    @keyframes pulseRing{0%{transform:translate(-50%,-50%) scale(0.9);opacity:0.8;}70%,100%{transform:translate(-50%,-50%) scale(1.15);opacity:0;}}
    .orbit-wrap{position:absolute;top:50%;left:50%;width:0;height:0;animation:spinRing 3s linear infinite;}
    .coin{position:absolute;width:10px;height:10px;background:#f5a623;border-radius:50%;box-shadow:0 0 6px rgba(245,166,35,0.6);}
    .coin-1{top:-60px;left:-5px;animation:coinPulse 1.2s ease-in-out infinite;}
    .coin-2{top:-5px;left:55px;animation:coinPulse 1.2s ease-in-out 0.4s infinite;}
    .coin-3{top:50px;left:-5px;animation:coinPulse 1.2s ease-in-out 0.8s infinite;}
    @keyframes coinPulse{0%,100%{opacity:0.5;transform:scale(0.8);}50%{opacity:1;transform:scale(1.1);}}
    .brand-name{font-size:22px;font-weight:800;color:#00ffcc;letter-spacing:-0.5px;text-shadow:0 0 30px rgba(0,255,204,0.35);}
    .brand-sub{font-size:11px;color:rgba(139,160,184,0.7);margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}
    .progress-wrap{width:140px;margin-top:20px;}
    .progress-track{height:2px;background:rgba(0,240,255,0.08);border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#00ffcc,#00f0ff);border-radius:99px;animation:fillBar 2s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;}
    @keyframes fillBar{to{width:85%;}}
    .progress-dots{display:flex;gap:5px;justify-content:center;margin-top:12px;}
    .dot{width:5px;height:5px;border-radius:50%;background:rgba(0,240,255,0.2);}
    .dot:nth-child(1){animation:dotBlink 1.2s ease-in-out 0s infinite;}
    .dot:nth-child(2){animation:dotBlink 1.2s ease-in-out 0.2s infinite;}
    .dot:nth-child(3){animation:dotBlink 1.2s ease-in-out 0.4s infinite;}
    @keyframes dotBlink{0%,100%{background:rgba(0,240,255,0.2);}50%{background:#00f0ff;}}
/* MENU LIST */
.menu-group {
    background: var(--card-bg);

}
.menu-item {

.menu-item:last-child { border-bottom: none; }

.menu-icon-box {

    display: flex;

    justify-content: center;
    color: var(--primary);
}

.menu-text { flex: 1; font-weight: 600; font-size: 18px; color: #f1f5f9; }

.menu-icon {
    width: 22px;
    height: 22px;
    stroke: #00ffcc; /* Matches your brand color */
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
}

.chevron {
    width: 16px;
    height: 16px;
    stroke: rgba(255,255,255,0.3);
    stroke-width: 2.5;
}

</style>

<!-- FIREBASE + LOGIC -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

let uid = localStorage.getItem("uid");
if (!uid) window.location.href = "signin.html";

/* NAV & LINKS */
function nav(p){ window.location.href = p; }
function goRecharge(){ window.location.href = "recharge.html"; }
function goWithdraw(){ window.location.href = "withdraw.html"; }
function logout(){ localStorage.removeItem("uid"); window.location.href = "signin.html"; }
function goTransactions(){ window.location.href = "transactions.html"; }
function goBank(){ window.location.href = "bank.html"; }
function goTeam(){ window.location.href = "teamrecord.html"; }
function goMiner(){ window.location.href = "miner-record.html"; }

/* LOADER — outside auth, fires immediately */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.querySelector(".page-content").style.opacity = "1";
  }, 1500);
});

/* LIVE DATA — inside auth */
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = "signin.html"; return; }
  db.ref("users/" + uid).on("value", snap => {
    const d = snap.val() || {};
    document.getElementById("userId").innerText    = d.minerId || "-";
    document.getElementById("points").innerText    = d.points  || 0;
    document.getElementById("balance").innerText = (d.balance || 0).toFixed(2);
    document.getElementById("team").innerText = (d.team || 0).toFixed(2);
    document.getElementById("minerLevel").innerText = d.level  || "Novice Miner";
  });
});
</script>
