/* 👇 ADD IT HERE */

/* WRAPPER */
.wrapper{

 /* increase this */

/* TITLE */
.title{
    text-align:center;
    font-size:30px;
    font-weight:900;
    color:#00ffcc;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 5px #00ffcc;}

/* MINER CARD */
.miner-card{
    margin-top:20px;
    padding:20px;
    border-radius:18px;
    background:linear-gradient(145deg,#020617,#0f172a);
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 25px rgba(0,255,204,0.08);
}

/* LEFT INFO */
.miner-info{ flex:1; }

.miner-title{
    font-size:16px;
    font-weight:700;
    color:#e5e7eb; /* soft white */
    letter-spacing:0.5px;
}

.miner-id{
    color:#22c55e; /* deeper green */
    font-size:15px;
    font-weight:700;
}

.miner-level{
    margin-top:8px;
    color:#38bdf8; /* clean blue */
    font-weight:600;
    font-size:14px;
}

/* BADGE */
.badge{
    margin-top:10px;
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#022c22;
    color:#00ff9d;
    font-size:12px;
    position:relative;
    overflow:hidden;
}
.badge::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    left:-100%;
    top:0;
    background:linear-gradient(120deg,transparent,rgba(0,255,200,0.5),transparent);
    animation:shine 2s infinite;
}
.miner-status{
    margin-top:6px;
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 8px;
    border-radius:12px;
    background:rgba(255,0,0,0.1);
    color:#ff4d4d;
    font-size:10px;
    font-weight:600;
    animation: blink 1s infinite;
}

.miner-status .dot{
    width:5px;
    height:5px;
    background:#ff0000;
    border-radius:50%;
    box-shadow:0 0 6px #ff0000;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

@keyframes shine{
    100%{left:100%;}
}

/* VISUAL */
.visual{
    width:100px;
    height:100px;
    position:relative;
}

/* ✅ FIXED: REAL IMAGES */
.coin{

.bot{

    left:25px;
    background:url("./bot.png") no-repeat center/contain;
    animation:pulse 2s infinite;

}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}

<script>
function nav(page){

/* MARKET */
const coins = [
  {
    id: "bitcoin",
    symbol: "btc",
    img: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png"
  },
  {
    id: "ethereum",
    symbol: "eth",
    img: "https://assets.coingecko.com/coins/images/279/large/ethereum.png"
  },
  {
    id: "solana",
    symbol: "sol",
    img: "https://assets.coingecko.com/coins/images/4128/large/solana.png"
  }
];
let last={};

async function loadMarket(){
  try{
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.map(c => c.id).join(",")}&vs_currencies=usd`);
    
    const data = await res.json();

    let html = "";

    for (let coin of coins){
      let price = data[coin.id]?.usd || 0;
      let old = last[coin.id] || price;

      let up = price >= old;
      let color = up ? "#00ffcc" : "#ff4d4d";

      html += `
<div class="coin-card">
  <div class="coin-left">
    <img src="${coin.img}" class="coin-icon">
    <div>
      <div>${coin.id.toUpperCase()}</div>
      <small>${coin.id}/USD</small>
    </div>
  </div>
  <div class="coin-right">
    <div class="coin-price">$${price.toLocaleString()}</div>
    <div class="coin-change" style="color:${color}">
      ${up ? "▲ Up" : "▼ Down"}
    </div>
  </div>
</div>
`;
      last[coin.id] = price;
    }

    document.getElementById("market").innerHTML = html;

  }catch(e){
    console.log("Market error:", e);
  }
}
 
loadMarket();
setInterval(loadMarket,10000);
</script>

<script>
let index = 0;

window.onload = () => {
  const slides = document.querySelector('.slides');
  const totalSlides = document.querySelectorAll('.slide').length;

  function showSlide() {
    index++;
    if (index >= totalSlides) {
      index = 0;
    }
    slides.style.transform = `translateX(-${index * 100}%)`;
  }

  setInterval(showSlide, 2000);

  let startX = 0;

  slides.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  slides.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
      showSlide();
    }

    if (endX - startX > 50) {
      index--;
      if (index < 0) index = totalSlides - 1;
      slides.style.transform = `translateX(-${index * 100}%)`;
    }
  });
};
</script>
<script>
let startX = 0;
let endX = 0;

const wrapper = document.querySelector(".wrapper");

wrapper.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

wrapper.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 80){
    goNext();
  }

  if(diff < -80){
    goPrev();
  }
});

function goNext(){
  if(window.location.pathname.includes("dashboard")){
    window.location.href = "miner.html";
  } else if(window.location.pathname.includes("miner")){
    window.location.href = "me.html";
  }
}

function goPrev(){
  if(window.location.pathname.includes("me")){
    window.location.href = "miner.html";
  } else if(window.location.pathname.includes("miner")){
    window.location.href = "dashboard.html";
  }
}
</script>
</script>

<script>
window.addEventListener("load", () => {

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.querySelector(".page-content").style.opacity = "1";
  }, 1500);

});
</script>
<script>
// Dynamic mining status - shows Active or Inactive
db.ref("users/" + uid).on("value", snapshot => {
    const data = snapshot.val() || {};
    const isMining = data.mining === true || (data.miners && Object.keys(data.miners).length > 0);
    
    const statusText = document.getElementById("statusText");
    const statusDot = document.getElementById("statusDot");
    
    if (isMining) {
        statusText.textContent = "Mining Active";
        statusDot.style.background = "#22c55e";
        statusDot.style.boxShadow = "0 0 6px #22c55e";
        document.getElementById("minerStatus").style.background = "rgba(34,197,94,0.1)";
        document.getElementById("minerStatus").style.color = "#22c55e";
    } else {
        statusText.textContent = "Mining Inactive";
        statusDot.style.background = "#ef4444";
        statusDot.style.boxShadow = "0 0 6px #ef4444";
        document.getElementById("minerStatus").style.background = "rgba(239,68,68,0.1)";
        document.getElementById("minerStatus").style.color = "#ef4444";
    }
});
</script>
</body>
</html>
