<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus Codes • Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#020617;--s1:#0c1628;--s2:#111f35;--neon:#00f0ff;--green:#22c55e;--gold:#f59e0b;--red:#ef4444;--border:rgba(0,240,255,0.12);--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.header{padding:16px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back{font-size:22px;color:var(--neon);text-decoration:none;}
.title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--neon);}
.wrap{padding:16px;}

/* CREATE CARD */
.card{background:var(--s1);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid var(--border);}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.field input,.field select{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.field input:focus,.field select:focus{border-color:var(--neon);}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;}
.field input[type="text"]{text-transform:uppercase;letter-spacing:0.1em;font-weight:700;font-size:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.create-btn{width:100%;padding:14px;background:linear-gradient(90deg,#00f0ff,#00ffcc);color:#000;font-weight:800;font-size:15px;border:none;border-radius:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:0.2s;}
.create-btn:active{transform:scale(0.98);}
.create-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--s1);border-radius:14px;padding:14px;text-align:center;border:1px solid var(--border);}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--neon);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}

/* CODES LIST */
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}
.code-card{background:var(--s1);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border);transition:0.2s;}
.code-card.claimed{border-color:rgba(100,116,139,0.2);opacity:0.6;}
.code-card.active-code{border-color:rgba(34,197,94,0.25);}
.code-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.code-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:0.1em;}
.code-name.active-text{color:var(--green);}
.code-name.claimed-text{color:var(--muted);}
.code-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.06em;}
.badge-active{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.badge-claimed{background:rgba(100,116,139,0.1);color:var(--muted);border:1px solid rgba(100,116,139,0.2);}
.badge-expired{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.code-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.code-det{background:var(--s2);border-radius:10px;padding:10px;text-align:center;}
.det-val{font-size:15px;font-weight:700;color:var(--text);}
.det-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.code-desc{font-size:12px;color:var(--muted);margin-bottom:12px;}
.code-claimed-by{font-size:12px;color:var(--muted);background:var(--s2);border-radius:8px;padding:8px 10px;margin-bottom:12px;}
.code-claimed-by span{color:var(--text);font-weight:600;}
.code-actions{display:flex;gap:8px;}
.code-btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:0.2s;}
.code-btn:active{transform:scale(0.97);}
.btn-delete{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-deactivate{background:rgba(100,116,139,0.1);color:var(--muted);border:1px solid rgba(100,116,139,0.2);}
.btn-activate{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.btn-copy{background:rgba(0,240,255,0.08);color:var(--neon);border:1px solid rgba(0,240,255,0.15);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{background:var(--green);color:#022c22;}
.toast.err{background:var(--red);color:#fff;}
.toast.info{background:var(--neon);color:#000;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:14px;}
.filter-tab{padding:7px 16px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:0.15s;}
.filter-tab.active{background:rgba(0,240,255,0.1);border-color:rgba(0,240,255,0.3);color:var(--neon);}
</style>
</head>
<body>

<div class="header">
  <a href="admin.html" class="back">←</a>
  <div class="title">🎁 Bonus Code Manager</div>
</div>

<div class="wrap">

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="statActive">0</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-val" id="statClaimed">0</div><div class="stat-lbl">Claimed</div></div>
  </div>

  <!-- CREATE CODE -->
  <div class="card">
    <div class="card-title">➕ Create New Code</div>

    <div class="field">
      <label>Bonus Code</label>
      <input type="text" id="newCode" placeholder="E.G. LAUNCH50" maxlength="20" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
      <div class="hint">All caps, no spaces. Users will type this exactly.</div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Bonus Amount ($)</label>
        <input type="number" id="newAmount" placeholder="5.00" min="0.01" step="0.01">
      </div>
      <div class="field">
        <label>Expires (optional)</label>
        <input type="datetime-local" id="newExpiry">
        <div class="hint">Leave blank = never</div>
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <input type="text" id="newDesc" placeholder="e.g. Launch week bonus" style="text-transform:none;letter-spacing:0;font-size:14px;font-weight:400;">
    </div>

    <button class="create-btn" id="createBtn" onclick="createCode()">🎁 Create Code</button>
  </div>

  <!-- CODES LIST -->
  <div class="sec-title">All Codes</div>
  <div class="filter-tabs">
    <div class="filter-tab active" onclick="setFilter('all',this)">All</div>
    <div class="filter-tab" onclick="setFilter('active',this)">Active</div>
    <div class="filter-tab" onclick="setFilter('claimed',this)">Claimed</div>
  </div>
  <div id="codesList"><div class="empty">Loading codes...</div></div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:"cj-miner.firebaseapp.com",
  databaseURL:"https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"cj-miner"
});
const db   = firebase.database();
const auth = firebase.auth();
const ADMIN_UID = "1G40GHwudBcea5GGdEeIIKFT5rL2";

let allCodes   = {};
let allUsers   = {};
let activeFilter = "all";

auth.onAuthStateChanged(user => {
  if (!user || user.uid !== ADMIN_UID) { alert("Access denied"); window.location.href = "admin.html"; return; }
  loadUsers();
  listenCodes();
});

async function loadUsers() {
  const snap = await db.ref("users").once("value");
  allUsers = snap.val() || {};
}

function listenCodes() {
  db.ref("promoCodes").on("value", snap => {
    allCodes = snap.val() || {};
    renderStats();
    renderCodes();
  });
}

function renderStats() {
  const vals   = Object.values(allCodes);
  const total   = vals.length;
  const claimed = vals.filter(c => c.claimedBy).length;
  const active  = vals.filter(c => c.active && !c.claimedBy).length;
  document.getElementById("statTotal").textContent   = total;
  document.getElementById("statActive").textContent  = active;
  document.getElementById("statClaimed").textContent = claimed;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderCodes();
}

function renderCodes() {
  const list = document.getElementById("codesList");
  let entries = Object.entries(allCodes).sort((a,b) => (b[1].createdAt||0) - (a[1].createdAt||0));

  if (activeFilter === "active")  entries = entries.filter(([,c]) => c.active && !c.claimedBy);
  if (activeFilter === "claimed") entries = entries.filter(([,c]) => !!c.claimedBy);

  if (!entries.length) {
    list.innerHTML = `<div class="empty">No codes found</div>`;
    return;
  }

  list.innerHTML = "";
  const now = Date.now();

  entries.forEach(([code, c]) => {
    const isClaimed = !!c.claimedBy;
    const isExpired = c.expiresAt && c.expiresAt > 0 && now > c.expiresAt && !isClaimed;
    const isActive  = c.active && !isClaimed && !isExpired;

    const badgeClass = isClaimed ? "badge-claimed" : isExpired ? "badge-expired" : "badge-active";
    const badgeText  = isClaimed ? "Claimed" : isExpired ? "Expired" : "Active";
    const nameClass  = isClaimed || isExpired ? "claimed-text" : "active-text";
    const cardClass  = isClaimed || isExpired ? "claimed" : "active-code";

    // Claimer info
    let claimerHTML = "";
    if (isClaimed) {
      const claimer  = allUsers[c.claimedBy] || {};
      const claimerId = claimer.minerId || c.claimedBy.slice(0,8);
      const claimDate = c.claimedAt ? new Date(c.claimedAt).toLocaleString("en-NG") : "—";
      claimerHTML = `<div class="code-claimed-by">Claimed by <span>${claimerId}</span> on ${claimDate}</div>`;
    }

    const expiryText = c.expiresAt && c.expiresAt > 0
      ? new Date(c.expiresAt).toLocaleDateString("en-NG")
      : "Never";

    const div = document.createElement("div");
    div.className = `code-card ${cardClass}`;
    div.innerHTML = `
      <div class="code-top">
        <div class="code-name ${nameClass}">${code}</div>
        <div class="code-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="code-details">
        <div class="code-det"><div class="det-val" style="color:#00ff88;">$${(c.amount||0).toFixed(2)}</div><div class="det-lbl">Amount</div></div>
        <div class="code-det"><div class="det-val">${expiryText}</div><div class="det-lbl">Expires</div></div>
      </div>
      ${c.description ? `<div class="code-desc">📝 ${c.description}</div>` : ""}
      ${claimerHTML}
      <div class="code-actions">
        <button class="code-btn btn-copy" onclick="copyCode('${code}')">📋 Copy</button>
        ${isActive  ? `<button class="code-btn btn-deactivate" onclick="toggleCode('${code}',false)">Deactivate</button>` : ""}
        ${!isActive && !isClaimed ? `<button class="code-btn btn-activate" onclick="toggleCode('${code}',true)">Activate</button>` : ""}
        <button class="code-btn btn-delete" onclick="deleteCode('${code}')">🗑</button>
      </div>`;
    list.appendChild(div);
  });
}

async function createCode() {
  const code   = document.getElementById("newCode").value.trim().toUpperCase();
  const amount = parseFloat(document.getElementById("newAmount").value);
  const desc   = document.getElementById("newDesc").value.trim();
  const expiry = document.getElementById("newExpiry").value;

  if (!code)        return showToast("Enter a code", "err");
  if (!amount || amount <= 0) return showToast("Enter a valid amount", "err");
  if (allCodes[code]) return showToast("Code already exists", "err");

  const btn = document.getElementById("createBtn");
  btn.disabled = true; btn.textContent = "Creating...";

  const data = {
    amount,
    description: desc || "",
    active:      true,
    createdAt:   Date.now(),
    claimedBy:   null,
    claimedAt:   null,
    expiresAt:   expiry ? new Date(expiry).getTime() : 0
  };

  await db.ref(`promoCodes/${code}`).set(data);

  document.getElementById("newCode").value   = "";
  document.getElementById("newAmount").value = "";
  document.getElementById("newDesc").value   = "";
  document.getElementById("newExpiry").value = "";
  btn.disabled = false; btn.textContent = "🎁 Create Code";
  showToast(`✅ Code ${code} created!`, "ok");
}

async function deleteCode(code) {
  if (!confirm(`Delete code "${code}"? This cannot be undone.`)) return;
  await db.ref(`promoCodes/${code}`).remove();
  showToast(`🗑 ${code} deleted`, "info");
}

async function toggleCode(code, active) {
  await db.ref(`promoCodes/${code}`).update({ active });
  showToast(active ? `✅ ${code} activated` : `⏸ ${code} deactivated`, "ok");
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast(`📋 Copied: ${code}`, "info"));
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = "toast", 3000);
}
</script>
</body>
</html>
