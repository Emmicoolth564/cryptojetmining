<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus Credit • CryptoJet Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020617; --s1:#0c1628; --s2:#111f35;
  --neon:#00f0ff; --green:#22c55e; --gold:#f59e0b;
  --red:#ef4444; --border:rgba(0,240,255,0.12);
  --text:#e2e8f0; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.header{padding:18px 16px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back{font-size:24px;color:var(--neon);cursor:pointer;text-decoration:none;}
.header-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--neon);}
.wrap{padding:16px;}

/* CONFIG CARD */
.config-card{background:var(--s1);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid var(--border);}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
.field input:focus{outline:none;border-color:var(--neon);}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;}

.scan-btn{width:100%;padding:14px;background:linear-gradient(90deg,#00f0ff,#00ffcc);color:#000;font-weight:800;font-size:15px;border:none;border-radius:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:0.2s;}
.scan-btn:active{transform:scale(0.98);}
.scan-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* RESULTS */
.results-card{background:var(--s1);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid var(--border);display:none;}
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.sum-item{background:var(--s2);border-radius:12px;padding:12px;text-align:center;}
.sum-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--neon);}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}

.user-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;margin-bottom:16px;}
.user-row{background:var(--s2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.user-row.selected{border:1.5px solid rgba(34,197,94,0.4);}
.user-info{}
.user-id{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--neon);}
.user-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.user-right{text-align:right;}
.user-bonus{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--green);}
.user-miners{font-size:11px;color:var(--muted);margin-top:2px;}
.check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:12px;flex-shrink:0;}
.check.on{background:var(--green);border-color:var(--green);}

.credit-btn{width:100%;padding:15px;background:linear-gradient(90deg,#22c55e,#00ffcc);color:#022c22;font-weight:800;font-size:15px;border:none;border-radius:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:0.2s;}
.credit-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* PROGRESS */
.progress-wrap{display:none;margin-bottom:16px;}
.progress-bar{height:6px;background:var(--s2);border-radius:999px;overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#00ffcc);border-radius:999px;transition:width 0.3s;}
.progress-text{font-size:13px;color:var(--muted);text-align:center;}

/* LOG */
.log-wrap{background:var(--s2);border-radius:14px;padding:14px;max-height:200px;overflow-y:auto;font-size:12px;font-family:monospace;color:#94a3b8;display:none;}
.log-line{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.log-line.ok{color:var(--green);}
.log-line.err{color:var(--red);}
.log-line.info{color:var(--neon);}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{background:var(--green);color:#022c22;}
.toast.error{background:var(--red);color:#fff;}
</style>
</head>
<body>

<div class="header">
  <a href="admin.html" class="back">←</a>
  <div class="header-title">🎁 Referral Bonus Credit</div>
</div>

<div class="wrap">

  <!-- CONFIG -->
  <div class="config-card">
    <div class="card-title">⚙️ Bonus Settings</div>
    <div class="field">
      <label>Bonus Amount Per Qualifying Referral ($)</label>
      <input type="number" id="bonusAmount" value="2" min="0.01" step="0.01">
      <div class="hint">Amount to credit to referrer per valid purchase today</div>
    </div>
    <div class="field">
      <label>Qualifying Period — From</label>
      <input type="datetime-local" id="dateFrom">
      <div class="hint">Set to start of today (midnight)</div>
    </div>
    <div class="field">
      <label>Qualifying Period — To</label>
      <input type="datetime-local" id="dateTo">
      <div class="hint">Set to end of today (11:59 PM)</div>
    </div>
    <button class="scan-btn" id="scanBtn" onclick="scanQualifiers()">🔍 Scan for Qualifying Referrers</button>
  </div>

  <!-- RESULTS -->
  <div class="results-card" id="resultsCard">
    <div class="card-title">✅ Qualifying Referrers Found</div>
    <div class="summary-strip">
      <div class="sum-item"><div class="sum-val" id="sumReferrers">0</div><div class="sum-lbl">Referrers</div></div>
      <div class="sum-item"><div class="sum-val" id="sumReferrals">0</div><div class="sum-lbl">Purchases</div></div>
      <div class="sum-item"><div class="sum-val" id="sumTotal">$0</div><div class="sum-lbl">Total Payout</div></div>
    </div>
    <div class="user-list" id="userList"></div>
    <button class="credit-btn" id="creditBtn" onclick="creditAll()">💸 Credit All Selected Users</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Processing...</div>
  </div>

  <!-- LOG -->
  <div class="log-wrap" id="logWrap"></div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:"cj-miner.firebaseapp.com",
  databaseURL:"https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"cj-miner"
});
const db   = firebase.database();
const auth = firebase.auth();
const ADMIN_UID = "1G40GHwudBcea5GGdEeIIKFT5rL2";

// Qualifying miners — S-244 and above
const QUALIFYING_MINERS = ["S244","S500","S900","S1200","JX200","JX500","PX1K","PX2K","EX3K","EX5K","LX3K","LX5K","EM4K","EM5K"];

let allUsers     = {};
let qualifiers   = []; // [{ referrerUid, referrerId, name, count, bonus }]
let selectedUids = new Set();

// Set default date range to today
window.addEventListener("load", () => {
  const now   = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const end   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  const toLocal = d => new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById("dateFrom").value = toLocal(start);
  document.getElementById("dateTo").value   = toLocal(end);

  auth.onAuthStateChanged(user => {
    if (!user || user.uid !== ADMIN_UID) {
      alert("Access denied"); window.location.href = "admin.html"; return;
    }
  });
});

async function scanQualifiers() {
  const bonusAmt = parseFloat(document.getElementById("bonusAmount").value);
  const fromTs   = new Date(document.getElementById("dateFrom").value).getTime();
  const toTs     = new Date(document.getElementById("dateTo").value).getTime();

  if (!bonusAmt || !fromTs || !toTs) return showToast("Fill in all fields first", "error");

  const btn = document.getElementById("scanBtn");
  btn.disabled = true; btn.textContent = "🔍 Scanning...";

  log("Fetching all users...", "info");

  const snap = await db.ref("users").once("value");
  allUsers   = snap.val() || {};

  // Find all users who bought a qualifying miner today
  // by checking their minerUnlocked and purchaseDate in miners node
  const referrerMap = {}; // { referrerUid: count }

  Object.entries(allUsers).forEach(([uid, user]) => {
    const referredBy = user.referredBy;
    if (!referredBy) return; // no referrer = skip

    const miners  = user.miners || {};
    const unlocked = user.minerUnlocked || {};

    // Check each qualifying miner
    QUALIFYING_MINERS.forEach(minerId => {
      if (!unlocked[minerId]) return;
      const count = unlocked[minerId];
      for (let i = 1; i <= count; i++) {
        const key   = (minerId === "S244" || minerId === "S100") ? `${minerId}_${i}` : minerId;
        const mData = miners[key];
        if (!mData) return;
        const purchaseDate = mData.purchaseDate || mData.start || 0;
        if (purchaseDate >= fromTs && purchaseDate <= toTs) {
          // This user bought a qualifying miner in the window
          if (!referrerMap[referredBy]) referrerMap[referredBy] = 0;
          referrerMap[referredBy]++;
          log(`✅ ${user.minerId || uid.slice(0,8)} bought ${minerId} — referrer gets $${bonusAmt}`, "ok");
        }
      }
    });
  });

  qualifiers = Object.entries(referrerMap).map(([uid, count]) => {
    const u = allUsers[uid] || {};
    return { referrerUid: uid, minerId: u.minerId || "Unknown", name: u.name || "—", count, bonus: count * bonusAmt };
  }).sort((a,b) => b.count - a.count);

  btn.disabled = false; btn.textContent = "🔍 Scan for Qualifying Referrers";

  if (!qualifiers.length) {
    showToast("No qualifying referrers found for this period", "error");
    log("No qualifying referrers found.", "err");
    return;
  }

  renderResults(bonusAmt);
}

function renderResults(bonusAmt) {
  const totalReferrals = qualifiers.reduce((s,q) => s + q.count, 0);
  const totalPayout    = qualifiers.reduce((s,q) => s + q.bonus, 0);

  document.getElementById("sumReferrers").textContent = qualifiers.length;
  document.getElementById("sumReferrals").textContent = totalReferrals;
  document.getElementById("sumTotal").textContent     = "$" + totalPayout.toFixed(2);

  selectedUids = new Set(qualifiers.map(q => q.referrerUid));

  const list = document.getElementById("userList");
  list.innerHTML = "";

  qualifiers.forEach(q => {
    const row = document.createElement("div");
    row.className = "user-row selected";
    row.id = "row-" + q.referrerUid;
    row.innerHTML = `
      <div class="user-info">
        <div class="user-id">${q.minerId}</div>
        <div class="user-meta">${q.name} · ${q.count} qualifying referral${q.count!==1?"s":""}</div>
      </div>
      <div class="user-right">
        <div class="user-bonus">+$${q.bonus.toFixed(2)}</div>
        <div class="user-miners">${q.count} × $${bonusAmt}</div>
      </div>
      <div class="check on" id="chk-${q.referrerUid}" onclick="toggleSelect('${q.referrerUid}')">✓</div>`;
    list.appendChild(row);
  });

  document.getElementById("resultsCard").style.display = "block";
  showToast(`Found ${qualifiers.length} qualifying referrers!`, "success");
}

function toggleSelect(uid) {
  const chk = document.getElementById("chk-" + uid);
  const row = document.getElementById("row-" + uid);
  if (selectedUids.has(uid)) {
    selectedUids.delete(uid);
    chk.className = "check";
    chk.textContent = "";
    row.classList.remove("selected");
  } else {
    selectedUids.add(uid);
    chk.className = "check on";
    chk.textContent = "✓";
    row.classList.add("selected");
  }
}

async function creditAll() {
  const toCredit = qualifiers.filter(q => selectedUids.has(q.referrerUid));
  if (!toCredit.length) return showToast("No users selected", "error");

  if (!confirm(`Credit ${toCredit.length} users a total of $${toCredit.reduce((s,q)=>s+q.bonus,0).toFixed(2)}?`)) return;

  document.getElementById("creditBtn").disabled = true;
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("logWrap").style.display = "block";

  let done = 0;
  for (const q of toCredit) {
    try {
      // Credit balance
      await db.ref(`users/${q.referrerUid}/balance`).set(
        firebase.database.ServerValue.increment(q.bonus)
      );
      // Log transaction
      await db.ref(`userTransactions/${q.referrerUid}`).push({
        uid:    q.referrerUid,
        type:   "bonus",
        method: "referral_bonus",
        amount: q.bonus,
        note:   `Referral bonus — ${q.count} qualifying purchase${q.count!==1?"s":""}`,
        status: "approved",
        date:   Date.now()
      });

      done++;
      const pct = Math.round((done / toCredit.length) * 100);
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressText").textContent = `Credited ${done} of ${toCredit.length} users...`;
      log(`✅ Credited $${q.bonus.toFixed(2)} to ${q.minerId}`, "ok");
    } catch(e) {
      log(`❌ Failed for ${q.minerId}: ${e.message}`, "err");
    }
  }

  document.getElementById("progressText").textContent = `✅ Done! Credited ${done} users.`;
  document.getElementById("creditBtn").disabled = false;
  showToast(`✅ Successfully credited ${done} users!`, "success");
}

function log(msg, type="info") {
  const wrap = document.getElementById("logWrap");
  wrap.style.display = "block";
  const line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = new Date().toLocaleTimeString("en-NG") + " — " + msg;
  wrap.appendChild(line);
  wrap.scrollTop = wrap.scrollHeight;
}

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => t.className = "toast", 3000);
}
</script>
</body>
</html>
