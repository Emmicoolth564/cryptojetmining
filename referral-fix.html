<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Referral • Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#020617;--s1:#0c1628;--s2:#111f35;--neon:#00f0ff;--green:#22c55e;--gold:#f59e0b;--red:#ef4444;--purple:#a855f7;--border:rgba(0,240,255,0.12);--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.header{padding:18px 20px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;}
.back{font-size:24px;color:var(--neon);text-decoration:none;}
.title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--neon);}
.wrap{padding:16px;max-width:560px;margin:0 auto;}

.card{background:var(--s1);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid var(--border);}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px;}

.search-row{display:flex;gap:8px;}
.search-input{flex:1;padding:13px 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--neon);}
.search-input::placeholder{color:#334155;font-weight:500;letter-spacing:0;text-transform:none;}
.search-btn{padding:13px 18px;background:linear-gradient(90deg,#00f0ff,#00ffcc);color:#000;font-weight:800;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.search-btn:disabled{opacity:0.5;cursor:not-allowed;}

.result-box{margin-top:14px;background:var(--s2);border-radius:14px;padding:14px 16px;display:none;}
.result-box.show{display:block;}
.r-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--green);}
.r-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.r-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid rgba(255,255,255,0.04);margin-top:6px;}
.r-lbl{color:var(--muted);}
.r-val{font-weight:700;color:var(--text);}
.error-box{margin-top:10px;font-size:13px;color:var(--red);display:none;}
.error-box.show{display:block;}

.arrow-divider{text-align:center;font-size:24px;color:var(--muted);margin:4px 0;}

.summary-card{background:linear-gradient(135deg,rgba(168,85,247,0.08),rgba(0,240,255,0.04));border:1px solid rgba(168,85,247,0.25);border-radius:18px;padding:18px;margin-bottom:16px;display:none;}
.summary-card.show{display:block;}
.summary-title{font-size:13px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.summary-row:last-child{border-bottom:none;}
.summary-lbl{color:var(--muted);}
.summary-val{font-weight:700;}

.confirm-btn{width:100%;padding:16px;background:linear-gradient(90deg,#a855f7,#00f0ff);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:14px;cursor:pointer;margin-top:6px;font-family:'DM Sans',sans-serif;}
.confirm-btn:disabled{opacity:0.5;cursor:not-allowed;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.ok{background:var(--green);color:#022c22;}
.toast.err{background:var(--red);color:#fff;}

.log-card{background:var(--s1);border-radius:16px;padding:16px 18px;margin-bottom:10px;border:1px solid var(--border);}
.log-top{font-size:13px;color:var(--muted);margin-bottom:6px;}
.log-flow{font-size:14px;font-weight:700;}
.log-flow span{color:var(--green);}
.log-amt{font-size:12px;color:var(--gold);margin-top:4px;}
</style>
</head>
<body>

<div class="header">
  <a href="admin.html" class="back">←</a>
  <div class="title">🔧 Fix Referral</div>
</div>

<div class="wrap">

  <div class="card">
    <div class="card-title">Step 1 — User to Move</div>
    <div class="search-row">
      <input type="text" class="search-input" id="childCode" placeholder="e.g. CJ1234" maxlength="20" oninput="this.value=this.value.toUpperCase()">
      <button class="search-btn" id="childBtn" onclick="lookupChild()">Find</button>
    </div>
    <div class="result-box" id="childResult"></div>
    <div class="error-box" id="childError"></div>
  </div>

  <div class="arrow-divider">⬇</div>

  <div class="card">
    <div class="card-title">Step 2 — Correct Referrer</div>
    <div class="search-row">
      <input type="text" class="search-input" id="refCode" placeholder="e.g. CJ5678" maxlength="20" oninput="this.value=this.value.toUpperCase()">
      <button class="search-btn" id="refBtn" onclick="lookupReferrer()">Find</button>
    </div>
    <div class="result-box" id="refResult"></div>
    <div class="error-box" id="refError"></div>
  </div>

  <div class="summary-card" id="summaryCard">
    <div class="summary-title">⚠️ Confirm This Change</div>
    <div class="summary-row"><span class="summary-lbl">Moving</span><span class="summary-val" id="sumChild" style="color:var(--green)">—</span></div>
    <div class="summary-row"><span class="summary-lbl">From referrer</span><span class="summary-val" id="sumOld" style="color:var(--red)">—</span></div>
    <div class="summary-row"><span class="summary-lbl">To referrer</span><span class="summary-val" id="sumNew" style="color:var(--green)">—</span></div>
    <div class="summary-row"><span class="summary-lbl">Past team income to transfer</span><span class="summary-val" id="sumIncome" style="color:var(--gold)">$0.00</span></div>
    <button class="confirm-btn" id="confirmBtn" onclick="executeMove()">✅ Move User & Transfer Income</button>
  </div>

  <div class="card">
    <div class="card-title">Recent Fixes</div>
    <div id="logList"><div style="color:var(--muted);font-size:13px;">No fixes yet</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:"cj-miner.firebaseapp.com",
  databaseURL:"https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"cj-miner"
});
const db = firebase.database();
const auth = firebase.auth();
const ADMIN_UID = "1G40GHwudBcea5GGdEeIIKFT5rL2";
const myUid = localStorage.getItem("uid");

auth.onAuthStateChanged(user => {
  if (!user || user.uid !== ADMIN_UID) { alert("Access denied"); window.location.href = "admin.html"; return; }
  loadLogs();
});

let childUid = null, childData = null, oldReferrerUid = null, oldReferrerData = null;
let newReferrerUid = null, newReferrerData = null;
let transferAmount = 0, transferKeys = [];

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show " + type;
  setTimeout(() => t.className = "toast", 3000);
}

async function lookupChild() {
  const code = document.getElementById("childCode").value.trim();
  const errEl = document.getElementById("childError");
  const resEl = document.getElementById("childResult");
  errEl.className = "error-box"; resEl.className = "result-box";
  document.getElementById("summaryCard").classList.remove("show");
  if (!code) return;

  const idxSnap = await db.ref("minerIdIndex/" + code).once("value");
  if (!idxSnap.exists()) { errEl.textContent = "❌ No user found with Miner ID " + code; errEl.classList.add("show"); return; }

  childUid = idxSnap.val();
  const snap = await db.ref("users/" + childUid).once("value");
  childData = snap.val() || {};
  oldReferrerUid = childData.referredBy || null;
  oldReferrerData = null;

  if (oldReferrerUid) {
    const refSnap = await db.ref("users/" + oldReferrerUid).once("value");
    oldReferrerData = refSnap.val() || {};
  }

  resEl.innerHTML = `
    <div class="r-name">${childData.minerId || code}</div>
    <div class="r-sub">${childData.name || "Unknown"} · $${(childData.balance||0).toFixed(2)} balance</div>
    <div class="r-row"><span class="r-lbl">Current Referrer</span><span class="r-val">${oldReferrerData ? (oldReferrerData.minerId || "Unknown") : "None"}</span></div>`;
  resEl.classList.add("show");
  checkReadyToCompare();
}

async function lookupReferrer() {
  const code = document.getElementById("refCode").value.trim();
  const errEl = document.getElementById("refError");
  const resEl = document.getElementById("refResult");
  errEl.className = "error-box"; resEl.className = "result-box";
  document.getElementById("summaryCard").classList.remove("show");
  if (!code) return;

  const idxSnap = await db.ref("minerIdIndex/" + code).once("value");
  if (!idxSnap.exists()) { errEl.textContent = "❌ No user found with Miner ID " + code; errEl.classList.add("show"); return; }

  newReferrerUid = idxSnap.val();
  const snap = await db.ref("users/" + newReferrerUid).once("value");
  newReferrerData = snap.val() || {};

  resEl.innerHTML = `
    <div class="r-name">${newReferrerData.minerId || code}</div>
    <div class="r-sub">${newReferrerData.name || "Unknown"} · ${newReferrerData.referrals||0} referrals</div>`;
  resEl.classList.add("show");
  checkReadyToCompare();
}

async function checkReadyToCompare() {
  if (!childUid || !newReferrerUid) return;

  if (childUid === newReferrerUid) {
    showToast("Cannot be own referrer", "err");
    return;
  }
  if (oldReferrerUid === newReferrerUid) {
    showToast("Already under that referrer", "err");
    return;
  }

  transferAmount = 0;
  transferKeys = [];
  if (oldReferrerUid) {
    const incomeSnap = await db.ref("teamIncome/" + oldReferrerUid).once("value");
    const records = incomeSnap.val() || {};
    Object.entries(records).forEach(([key, rec]) => {
      if (rec.fromUid === childUid) {
        transferAmount += (rec.amount || 0);
        transferKeys.push(key);
      }
    });
  }

  document.getElementById("sumChild").textContent  = childData.minerId || "—";
  document.getElementById("sumOld").textContent     = oldReferrerData ? (oldReferrerData.minerId || "Unknown") : "None";
  document.getElementById("sumNew").textContent     = newReferrerData.minerId || "—";
  document.getElementById("sumIncome").textContent  = "$" + transferAmount.toFixed(4);
  document.getElementById("summaryCard").classList.add("show");
}

async function executeMove() {
  if (!childUid || !newReferrerUid) return;
  if (!confirm("Move " + childData.minerId + " from " + (oldReferrerData?.minerId||"None") + " to " + newReferrerData.minerId + "?\n\nThis will also transfer $" + transferAmount.toFixed(4) + " in past team income.\n\nThis cannot be undone automatically.")) return;

  const btn = document.getElementById("confirmBtn");
  btn.disabled = true; btn.textContent = "Processing...";

  try {
    const updates = {};
    const now = Date.now();
    const hasMiner = Object.keys(childData.minerUnlocked || {}).length > 0;

    updates["users/" + childUid + "/referredBy"] = newReferrerUid;

    if (oldReferrerUid) {
      updates["users/" + oldReferrerUid + "/teamMembers/" + childUid] = null;
      updates["users/" + oldReferrerUid + "/referrals"] = firebase.database.ServerValue.increment(-1);
      updates["users/" + oldReferrerUid + "/team"] = firebase.database.ServerValue.increment(-transferAmount);
    }

    updates["users/" + newReferrerUid + "/teamMembers/" + childUid] = {
      minerId: childData.minerId || "Unknown",
      name: childData.name || "miner",
      joinedAt: now,
      hasMiner: hasMiner
    };
    updates["users/" + newReferrerUid + "/referrals"] = firebase.database.ServerValue.increment(1);
    updates["users/" + newReferrerUid + "/team"] = firebase.database.ServerValue.increment(transferAmount);

    if (oldReferrerUid && transferKeys.length) {
      const incomeSnap = await db.ref("teamIncome/" + oldReferrerUid).once("value");
      const records = incomeSnap.val() || {};
      transferKeys.forEach(key => {
        updates["teamIncome/" + oldReferrerUid + "/" + key] = null;
        const rec = records[key];
        if (rec) {
          const newKey = db.ref("teamIncome/" + newReferrerUid).push().key;
          updates["teamIncome/" + newReferrerUid + "/" + newKey] = Object.assign({}, rec, { migratedFrom: oldReferrerUid, migratedAt: now });
        }
      });
    }

    const logKey = db.ref("referralFixes").push().key;
    updates["referralFixes/" + logKey] = {
      childUid: childUid,
      childMinerId: childData.minerId || "—",
      oldReferrerUid: oldReferrerUid || null,
      oldReferrerMinerId: oldReferrerData ? (oldReferrerData.minerId || "Unknown") : "None",
      newReferrerUid: newReferrerUid,
      newReferrerMinerId: newReferrerData.minerId || "—",
      transferAmount: transferAmount,
      adminUid: myUid,
      fixedAt: now
    };

    await db.ref().update(updates);

    showToast("Moved " + childData.minerId + " successfully!", "ok");
    document.getElementById("childCode").value = "";
    document.getElementById("refCode").value = "";
    document.getElementById("childResult").className = "result-box";
    document.getElementById("refResult").className = "result-box";
    document.getElementById("summaryCard").classList.remove("show");
    childUid = null; oldReferrerUid = null; newReferrerUid = null;
    loadLogs();

  } catch (e) {
    console.error(e);
    showToast("Failed: " + e.message, "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "✅ Move User & Transfer Income";
  }
}

function loadLogs() {
  db.ref("referralFixes").orderByChild("fixedAt").limitToLast(15).once("value", function(snap) {
    const list = document.getElementById("logList");
    const recs = [];
    snap.forEach(function(c) { recs.push(c.val()); });
    recs.reverse();
    if (!recs.length) { list.innerHTML = '<div style="color:var(--muted);font-size:13px;">No fixes yet</div>'; return; }
    list.innerHTML = recs.map(function(r) {
      return '<div class="log-card">' +
        '<div class="log-top">' + new Date(r.fixedAt).toLocaleString("en-NG") + '</div>' +
        '<div class="log-flow"><span>' + r.childMinerId + '</span> moved: ' + r.oldReferrerMinerId + ' to <span>' + r.newReferrerMinerId + '</span></div>' +
        (r.transferAmount > 0 ? '<div class="log-amt">$' + r.transferAmount.toFixed(4) + ' team income transferred</div>' : '') +
        '</div>';
    }).join("");
  });
}
</script>
</body>
</html>
